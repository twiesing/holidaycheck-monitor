# Fronted by the hueske-digital/caddy stack (Caddy + tinyauth + your OIDC
# provider, e.g. Pocket ID). Caddy discovers this service on the shared `caddy`
# network via the CADDY_* env vars below and handles TLS + forward-auth — so no
# port is published here.
#
# Provide the deployment-specific values in a sibling .env file (git-ignored):
#   CADDY_DOMAIN=holiday.example.com
#   CADDY_AUTH_GROUPS=larissa_und_tobias
#   PUSHOVER_TOKEN=...        # optional
#   PUSHOVER_USER=...         # optional
#   PUSHOVER_DEVICE=...       # optional
services:
  holidaycheck-monitor:
    image: ghcr.io/OWNER/holidaycheck-monitor:latest
    # build: .
    restart: unless-stopped
    environment:
      # --- App ---
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /data/holidaycheck-monitor.sqlite
      DEFAULT_CRON: "0 */6 * * *"
      SCRAPE_TIMEOUT_MS: 45000
      SCRAPE_ATTEMPTS: 4
      HEADLESS: "true"
      PUSHOVER_TOKEN: ${PUSHOVER_TOKEN:-}
      PUSHOVER_USER: ${PUSHOVER_USER:-}
      PUSHOVER_DEVICE: ${PUSHOVER_DEVICE:-}
      # --- Caddy (reverse proxy + auth) ---
      CADDY_DOMAIN: ${CADDY_DOMAIN:?set CADDY_DOMAIN in .env}
      CADDY_TYPE: external
      CADDY_PORT: 3000
      CADDY_AUTH: "true"
      CADDY_AUTH_GROUPS: ${CADDY_AUTH_GROUPS:?set CADDY_AUTH_GROUPS in .env}
    volumes:
      - holidaycheck-monitor-data:/data
    shm_size: "1gb"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/watches').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - caddy

volumes:
  holidaycheck-monitor-data:

networks:
  # Compose creates this as "<project>_caddy", matching the watcher's *_caddy pattern.
  caddy:
